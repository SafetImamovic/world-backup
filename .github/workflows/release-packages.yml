name: Release Packages

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            binary_name: world-backup.exe
            artifact_ext: zip
          - os: ubuntu-latest
            label: linux-x86_64
            binary_name: world-backup
            artifact_ext: tar.gz
          - os: macos-latest
            label: macos
            binary_name: world-backup
            artifact_ext: tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Read package version
        id: package
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [ -z "$version" ]; then
            echo "Failed to read package version from Cargo.toml" >&2
            exit 1
          fi
          artifact_name="world-backup-v${version}-${{ matrix.label }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.package.outputs.version }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version v${{ steps.package.outputs.version }}" >&2
            exit 1
          fi

      - name: Stage package contents
        shell: bash
        run: |
          rm -rf package
          mkdir -p package
          cp "target/release/${{ matrix.binary_name }}" package/
          cp README.md package/

      - name: Create Windows archive
        if: matrix.artifact_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path package\* -DestinationPath "${{ steps.package.outputs.artifact_name }}.zip" -Force

      - name: Create Unix archive
        if: matrix.artifact_ext == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${{ steps.package.outputs.artifact_name }}.tar.gz" -C package .

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.package.outputs.artifact_name }}.${{ matrix.artifact_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: world-backup-v*
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
